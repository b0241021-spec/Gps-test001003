name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.MY_PERSONAL_TOKEN }}

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Prepare Android Standard Environment
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    # 👑 核心大絕招：原地自動無限試錯迴圈 (對齊修正版)
    - name: Build and Auto-Heal Loop with Gemini
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_URL: "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
      run: |
        MAX_ATTEMPTS=5
        ATTEMPT=1
        BUILD_SUCCESS=false

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "========================================"
          echo "  🚀 開始第 $ATTEMPT 次嘗試編譯 APK..."
          echo "========================================"
          
          if ./gradlew assembleDebug --no-daemon > build.log 2>&1; then
            echo "✅ 恭喜！第 $ATTEMPT 次編譯成功！"
            BUILD_SUCCESS=true
            break
          else
            echo "❌ 第 $ATTEMPT 次編譯失敗。正在擷取錯誤日誌..."
            tail -n 80 build.log > error.log
            cat error.log
            
            # 🔍 核心防禦 1：利用 jq 安全地將多行日誌轉義為標準的單行 JSON 字串
            SAFE_ERROR_LOG=$(jq -Rs . error.log)
            
            echo "🧠 正在將錯誤回報給 Gemini API..."
            # 建立乾淨無污染的 JSON Payload
            PAYLOAD=$(jq -n --arg log "$SAFE_ERROR_LOG" '{
              contents: [{
                parts: [{
                  text: ("你是一個資深 Android 專家，目前專案編譯發生以下錯誤：\n" + $log + "\n\n請給出一段精準的 Linux sed 命令幫我修復這個檔案。只需要回覆單行 Linux 指令（如 sed -i ...），絕對不要包含 ``` 標籤、markdown 語法或任何多餘的聊天文字。")
                }]
              }]
            }')

            RESPONSE=$(curl -s -X POST "${API_URL}?key=${GEMINI_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
              
            PATCH_COMMAND=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null | sed 's/
