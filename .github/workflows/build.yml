name: Manus Force Inject and Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto Generate Blank Android Project Structure
      run: |
        gradle init --type basic --dsl gradle
        
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "ManusGpsApp"
        include ':app'
        EOF

        mkdir -p app/src/main/java/com/example/manusgps
        mkdir -p app/src/main/res/layout
        
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.manusgps'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.manusgps"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'com.google.android.gms:play-services-maps:18.2.0'
        }
        EOF

        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://android.com">
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="Manus GPS App"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Extract and Inject Manus Source Code
      run: |
        mkdir -p temp_manus
        unzip -q *.zip -d temp_manus || true
        
        MAIN_KT=$(find temp_manus -name "MainActivity.kt" -print -quit)
        if [ ! -z "$MAIN_KT" ]; then
            cp "$MAIN_KT" app/src/main/java/com/example/manusgps/MainActivity.kt
            sed -i '1s/^/package com.example.manusgps;\n/' app/src/main/java/com/example/manusgps/MainActivity.kt
        fi

        find temp_manus -name "*.kt" ! -name "MainActivity.kt" -exec cp {} app/src/main/java/com/example/manusgps/ \;

        MAIN_XML=$(find temp_manus -name "activity_main.xml" -print -quit)
        if [ ! -z "$MAIN_XML" ]; then
            cp "$MAIN_XML" app/src/main/res/layout/activity_main.xml
        fi
        
        rm -rf temp_manus *.zip

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-Injected-GPS-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
