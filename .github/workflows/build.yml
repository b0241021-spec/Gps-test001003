name: Manus Native Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 部署向下相容最強的 Java 11 環境
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 2. 強制把整個雲端系統的 Gradle 工具降版到 7.5
    - name: Setup Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    # 3. 解壓縮專案並大搬移
    - name: Extract Project and Relocate
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

        # 💡 終極修正：直接在根目錄強行覆蓋/寫入 gradle.properties，徹底開啟 AndroidX 機制！
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        echo "=== 已強制塞入相容 Gradle 7.5 的 AndroidX 開關 ==="
        ls -la

    # 4. 給予原本專案自帶的執行檔權限
    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    # 5. 用完美解開衝突的舊環境，直接原汁原味編譯 Manus AI 的專案！
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # 6. 上傳最終產出的 APK 成果檔
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Native-APK
        path: "**/build/outputs/apk/debug/*.apk"
