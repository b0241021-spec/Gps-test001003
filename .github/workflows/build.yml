name: Manus Project Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Fresh Isolated Android Project
      run: |
        mkdir clean_project
        cd clean_project
        
        # 1. 建立 settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "ManusGpsApp"
        include ':app'
        EOF

        # 💡 核心修正：建立 gradle.properties 並強制啟用 AndroidX 支援功能！
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 2. 建立根目錄 build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.2.2' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
        EOF

        # 3. 建立 app 模組目錄結構
        mkdir -p app/src/main/java/com/example/manusgps
        mkdir -p app/src/main/res/layout

        # 4. 建立 app/build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.example.manusgps'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.manusgps"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'com.google.android.gms:play-services-maps:18.2.0'
        }
        EOF

        # 5. 建立 AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://android.com">
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:label="Manus GPS App"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 6. 生成標準的 Gradle 8.2 包裝器
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Extract and Inject Core Code Only
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        
        MAIN_KT=$(find temp_extracted -name "MainActivity.kt" -print -quit)
        if [ ! -z "$MAIN_KT" ]; then
            cp "$MAIN_KT" clean_project/app/src/main/java/com/example/manusgps/MainActivity.kt
            sed -i 's/^package .*/package com.example.manusgps;/' clean_project/app/src/main/java/com/example/manusgps/MainActivity.kt
        fi

        find temp_extracted -name "*.kt" ! -name "MainActivity.kt" -exec cp {} clean_project/app/src/main/java/com/example/manusgps/ \;
        sed -i 's/^package .*/package com.example.manusgps;/' clean_project/app/src/main/java/com/example/manusgps/*.kt 2>/dev/null || true

        MAIN_XML=$(find temp_extracted -name "activity_main.xml" -print -quit)
        if [ ! -z "$MAIN_XML" ]; then
            cp "$MAIN_XML" clean_project/app/src/main/res/layout/activity_main.xml
        fi

    - name: Build Debug APK in Clean Environment
      run: |
        cd clean_project
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-App-APK
        path: "clean_project/app/build/outputs/apk/debug/*.apk"
