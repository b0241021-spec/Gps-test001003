name: Manus Native Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Extract Project and Relocate
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 補齊 Manus AI 漏掉的手機桌面 App 圖標
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

        # 💡 終極修正：自動修正第 142 行可能因為 Lambda 語法造成的 Cannot infer a type 錯誤
        # 這段指令會自動去尋找專案中的 MainActivity.kt 並幫它最常見的模糊參數對齊型態
        TARGET_KT=$(find . -name "MainActivity.kt" -print -quit)
        if [ ! -z "$TARGET_KT" ]; then
          echo "正在針對 $TARGET_KT 進行 Kotlin 語法相容性修正..."
          # 修正最常遇到的 LocationListener 或 OnClickListener 參數型態模糊
          sed -i '142s/{\s*location\s*->/{\s*location:\s*android.location.Location\s*->/' "$TARGET_KT" 2>/dev/null || true
          sed -i '142s/{\s*it\s*->/{\s*it:\s*android.view.View\s*->/' "$TARGET_KT" 2>/dev/null || true
        fi

        echo "=== 桌面圖標與 Kotlin 語法修正完成 ==="
        ls -la

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Native-APK
        path: "**/build/outputs/apk/debug/*.apk"
