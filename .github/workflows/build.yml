name: Manus Project Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Extract Project and Fix Path
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

    # 💡 核心大絕招：用強大的 Linux 替換指令（sed），把專案 build.gradle 裡舊版的 7.x 或 4.x 插件，強行文字替換升級為適應 Java 17 的最新版本 8.2.2 
    - name: Force Upgrade Android Plugin Version
      run: |
        if [ -f "build.gradle" ]; then
          sed -i "s/com.android.tools.build:gradle:[^']*'/com.android.tools.build:gradle:8.2.2'/g" build.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.2.2"/g' build.gradle
          sed -i "s/id 'com.android.application' version '[^']*'/id 'com.android.application' version '8.2.2'/g" build.gradle
        fi
        if [ -f "app/build.gradle" ]; then
          sed -i "s/com.android.tools.build:gradle:[^']*'/com.android.tools.build:gradle:8.2.2'/g" app/build.gradle
        fi
        echo "=== 已強制完成 Android 編譯插件版本升級 ==="

    - name: Check and Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
