name: Android AI Auto-Healing Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  auto_healing_and_build:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出程式碼
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
          fetch-depth: 0

      # 2. 【自我防禦機制】修復手機網頁快取弄壞的 Git URL
      - name: Self-Defending Git URL Fix
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 自動檢測並修復 .git/config 內的畸形網址
          # 將 github.com{GITHUB_REPOSITORY} 還原為正確格式
          sed -i 's|github.com@://|github.com/|g' .git/config
          sed -i 's|github.com{GITHUB_REPOSITORY}|https://${{ secrets.MY_PERSONAL_TOKEN }}@://github.com{{ github.repository }}|g' .git/config
          
          # 同步修正目前腳本的遠端連結，避免最後一步出錯
          git remote set-url origin https://${{ secrets.MY_PERSONAL_TOKEN }}@://github.com{{ github.repository }}.git
          
          # 檢查防禦後狀態
          git remote -v
          git status

      # 3. 設定 JDK 11 (向下相容方案)
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      # 4. 編譯測試 (Gradle 7.5 + 容錯機制)
      - name: Build with Gradle
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      # 5. 【AI 試錯機制】使用 Gemini 進行除錯與修正
      - name: Run Gemini Auto-Fix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 建立 AI 提示環境
          mkdir -p .ai_context
          echo "Start AI healing process..."
          # 這裡呼叫 Gemini 進行原始碼解析與修改 (Flow collect, SimulationState 等)
          curl -sSL https://githubusercontent.com | bash || true

      # 6. 【自我防禦 Git 推送】將 AI 修復結果推回倉庫 (帶入金鑰防錯)
      - name: Commit and Push AI Fixes
        run: |
          git add .
          git commit -m "Auto: Apply Self-Defending fix and Gemini code healer" || echo "No changes to commit"
          git push origin main || echo "Push failed, will retry in next cycle"

      # 7. 永動機觸發：重新啟動 Action 進行無限循環 (直到編譯成功)
      - name: Trigger Next Run (Eternal Loop)
        if: success() == false
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.MY_PERSONAL_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://github.com{{ github.repository }}/actions/workflows/build.yml/dispatches \
          -d '{"ref":"main"}'

      # 8. 上傳 APK 成果 (若編譯成功則中斷循環並產出)
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
