name: Manus Project Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Extract Project and Fix Path
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

    # 💡 核心修正：自動幫 Manus 的檔案補上缺少的 compileSdk 與 targetSdk 配置，防止閃退
    - name: Force Upgrade and Patch Android Settings
      run: |
        if [ -f "build.gradle" ]; then
          sed -i "s/com.android.tools.build:gradle:[^']*'/com.android.tools.build:gradle:8.2.2'/g" build.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.2.2"/g' build.gradle
          sed -i "s/id 'com.android.application' version '[^']*'/id 'com.android.application' version '8.2.2'/g" build.gradle
        fi
        
        if [ -f "app/build.gradle" ]; then
          sed -i "s/com.android.tools.build:gradle:[^']*'/com.android.tools.build:gradle:8.2.2'/g" app/build.gradle
          
          # 檢查若缺少 compileSdkVersion，就強行在 android { ... } 區塊內注入標準的 SDK 34 配置
          if ! grep -q "compileSdk" app/build.gradle; then
            sed -i '/android {/a \    compileSdk 34\n    defaultConfig {\n        targetSdk 34\n        minSdk 24\n    }' app/build.gradle
          fi
        fi
        echo "=== 已全自動補齊 Android SDK 與插件配置 ==="

    # 💡 核心修正：強制把雲端環境降級到穩定的 Gradle 8.2，徹底擺脫 Gradle 9.6.1 的高版本阻礙
    - name: Force Downgrade Gradle to Stable 8.2
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
