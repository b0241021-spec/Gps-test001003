name: Gemini AI Loop-Healing Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_with_ai_loop:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.MY_PERSONAL_TOKEN }}

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Prepare Android Standard Environment
      run: |
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    # 👑 核心大絕招：原地自動無限試錯迴圈 (Max 5 次，避免 API 額度噴光)
    - name: Build and Auto-Heal Loop with Gemini
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        API_URL: "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"
      run: |
        MAX_ATTEMPTS=5
        ATTEMPT=1
        BUILD_SUCCESS=false

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "========================================"
          echo "  🚀 開始第 $ATTEMPT 次嘗試編域 APK..."
          echo "========================================"
          
          # 嘗試編譯，並把日誌完整記錄
          if ./gradlew assembleDebug --no-daemon > build.log 2>&1; then
            echo "✅ 恭喜！第 $ATTEMPT 次編譯成功！"
            BUILD_SUCCESS=true
            break
          else
            echo "❌ 第 $ATTEMPT 次編譯失敗。正在擷取錯誤日誌..."
            tail -n 80 build.log > error.log
            cat error.log
            
            echo "🧠 正在將錯誤回報給 Gemini API..."
            ERROR_LOG=$(cat error.log)
            
            # 呼叫 Gemini 請求精準的修正命令
            RESPONSE=$(curl -s -X POST "${API_URL}?key=${GEMINI_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"contents\": [{\"parts\":[{\"text\": \"你是一個資深 Android 專家，目前專案編譯發生以下錯誤：\n${ERROR_LOG}\n\n請給出一段精準的 Linux sed 命令幫我修復這個檔案。只需要回覆單行 Linux 指令，不要有 markdown 語法，不要有任何多餘的聊天文字。\"}]}]}")
              
            PATCH_COMMAND=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' 2>/dev/null | sed 's/```bash//g;s/```//g;s/`//g;s/^[[:space:]]*//;s/[[:space:]]*$//')
            
            echo "=== Gemini 給出的主專案修復指令 ==="
            echo "$PATCH_COMMAND"
            
            # 定位檔案並進行預設基礎修復與 AI 的修復
            TARGET_KT=$(find . -name "MainActivity.kt" -print -quit)
            if [ ! -z "$TARGET_KT" ]; then
              # 先處理基礎的 SimulationState 預備工作
              KT_DIR=$(dirname "$TARGET_KT")
              MY_PACKAGE=$(grep "^package " "$TARGET_KT" | head -n 1)
              cat << EOF > "${KT_DIR}/SimulationState.kt"
              ${MY_PACKAGE}
              data class SimulationState(
                  val isRunning: Boolean = false,
                  val currentSpeed: Double = 0.0,
                  val latitude: Double = 0.0,
                  val longitude: Double = 0.0,
                  val progress: Int = 0,
                  val speedMultiplier: Float = 1.0f,
                  val statusText: String = ""
              )
              EOF
              
              sed -i "s/collect\s*{\s*$/collect { state: SimulationState ->/g" "$TARGET_KT" || true
              sed -i "s/collect\s*{\s*state\s*->/collect { state: SimulationState ->/g" "$TARGET_KT" || true
              sed -i "s/collect\s*{\s*it\s*->/collect { it: SimulationState ->/g" "$TARGET_KT" || true
              
              # 執行 Gemini 專屬 Patch
              if [ ! -z "$PATCH_COMMAND" ] && [ "$PATCH_COMMAND" != "null" ]; then
                echo "正在執行 AI Patch..."
                eval "$PATCH_COMMAND" || true
              fi
              
              echo "// PATCH_LOOP_$(date +%s)" >> "$TARGET_KT"
            else
              echo "找不到 MainActivity.kt，無法修復。"
            fi
          fi
          
          ATTEMPT=$((ATTEMPT+1))
        done

        # 迴圈結束後，如果最終還是沒成功，就讓這個 Step 宣告失敗
        if [ "$BUILD_SUCCESS" = false ]; then
          echo "❌ 已達到最大嘗試次數 $MAX_ATTEMPTS 次，編譯依然失敗。"
          exit 1
        fi

    # 👑 只有在完全成功後，才把最終修復完的完美程式碼 Push 回去庫房保存
    - name: Auto Commit Gemini Fix (Only on Success)
      if: success()
      env:
        PERSONAL_TOKEN: ${{ secrets.MY_PERSONAL_TOKEN }}
      run: |
        git config --global user.name "Gemini-AI-Bot"
        git config --global user.email "gemini-bot@github.com"
        git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git add .
        git commit -m "🤖 Gemini AI 全自動自我修復成功，更新正確原始碼" || exit 0
        git push --force

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Successful-APK
        path: "**/build/outputs/apk/debug/*.apk"
