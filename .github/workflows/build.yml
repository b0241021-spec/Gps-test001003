name: Manus Project Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Extract Project and Fix Path
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted
        ls -la

    # 💡 核心關鍵修改：檢查專案自帶的 gradlew 是否存在。如果存在就直接賦予權限執行；如果不存在，才建立相容性更好的 8.0 版本。
    - name: Check and Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          echo "偵測到專案自帶 gradlew，正在啟用..."
          chmod +x gradlew
        else
          echo "專案未帶 gradlew，正在為其建立標準包裝器..."
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
