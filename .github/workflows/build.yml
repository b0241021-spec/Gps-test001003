name: Android Gemini Auto Repair

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 允許手動觸發

jobs:
  auto-repair:
    runs-on: ubuntu-latest

    # 賦予寫入權限，這樣腳本才能把修好的程式碼 push 回去
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 取得完整歷史紀錄

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Install Dependencies (jq)
      run: sudo apt-get install -y jq

    - name: Run Gemini Auto Repair Loop
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TARGET_FILE: "app/src/main/java/com/example/myapp/MainActivity.kt" # 💡 請根據實際路徑修改
        LOG_FILE: "build_error.log"
        MAX_LOOPS: 5
      run: |
        echo "🚀 啟動 Gemini Android 自動修復機制 (CI/CD 專用版)..."
        
        # 設定 Git 機器人身分（Push 程式碼所需）
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        BUILD_SUCCESS=false

        for i in $(seq 1 $MAX_LOOPS); do
            echo "----------------------------------------"
            echo "🔄 正在進行第 $i / $MAX_LOOPS 次修復嘗試..."
            echo "----------------------------------------"

            echo "🛠️ 正在執行 Gradle 建置..."
            ./gradlew assembleDebug > $LOG_FILE 2>&1
            BUILD_STATUS=$?

            if [ $BUILD_STATUS -eq 0 ]; then
                echo "🎉 恭喜！專案已建置成功！"
                BUILD_SUCCESS=true
                rm -f $LOG_FILE
                break
            fi

            echo "❌ 建置失敗，正在召喚 Gemini 進行分析..."

            SYSTEM_PROMPT="你是一個高階 Android 資深工程師。請分析提供的原始碼與 Gradle 錯誤日誌（Error Log），並直接修正程式碼中的錯誤。
        請注意：
        1. **只能回傳修改後的完整程式碼**，絕對不要包含任何解釋、Markdown 標記（如 \`\`\`kotlin）或額外的文字。
        2. 確保語法完全正確，特別注意括號、導入包（imports）與變數命名。"

            # 使用 jq --rawfile 安全封裝
            PAYLOAD=$(jq -n \
                --rawfile code "$TARGET_FILE" \
                --rawfile err "$LOG_FILE" \
                --arg sys_prompt "$SYSTEM_PROMPT" \
                '{
                    "systemInstruction": { "parts": [{ "text": $sys_prompt }] },
                    "contents": [{
                        "parts": [{ "text": ("以下是目前有問題的原始碼：\n" + $code + "\n\n以下是 Gradle 錯誤日誌：\n" + $err) }]
                    }],
                    "generationConfig": {
                        "temperature": 0.2,
                        "responseMimeType": "text/plain"
                    }
                }')

            echo "🤖 正在等待 Gemini 回傳修正後的程式碼..."
            RESPONSE=$(curl -s -X POST \
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")

            FIXED_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

            if [ -z "$FIXED_CODE" ] || [[ "$FIXED_CODE" == *"generateContent"* ]]; then
                echo "⚠️ API 回傳異常，無法擷取程式碼。"
                echo "$RESPONSE"
                exit 1
            fi

            # 二次清洗 Markdown 標籤
            if [[ "$FIXED_CODE" == "\`\`\`"* ]]; then
                echo "🧹 進行自動清洗..."
                FIXED_CODE=$(echo "$FIXED_CODE" | sed -e 's/```[a-zA-Z]*//g' -e 's/```//g')
            fi

            # 覆寫檔案
            echo "$FIXED_CODE" > "$TARGET_FILE"
            echo "💾 修復程式碼已寫入 $TARGET_FILE，準備進入下一輪驗證。"
        done

        # 結束後的 Git 處理
        if [ "$BUILD_SUCCESS" = true ]; then
            # 檢查檔案是否有變動
            if [ -n "$(git status --porcelain)" ]; then
                echo "📝 偵測到程式碼有被 Gemini 修改，準備 Commit 並 Push..."
                git add "$TARGET_FILE"
                git commit -m "chore: [Gemini Auto Repair] 自動修復建置錯誤"
                git push origin HEAD:${{ github.ref }}
                echo "✅ 成功將修復後的程式碼推回分支！"
            else
                echo "😎 專案本來就是好的，Gemini 沒有做任何修改。"
            fi
            exit 0
        else
            echo "😭 已達到最大循環次數，建置依然失敗。請查看產出的 $LOG_FILE。"
            exit 1
        fi
