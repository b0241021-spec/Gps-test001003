name: Manus Native Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Extract Project and Relocate
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 補齊手機桌面 App 圖標
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

        # 💡 終極大絕招：全域自動對齊 Kotlin 型態！
        TARGET_KT=$(find . -name "MainActivity.kt" -print -quit)
        if [ ! -z "$TARGET_KT" ]; then
          echo "正在對 $TARGET_KT 進行全域代碼語法修復..."
          
          # 1. 先在頂端補上可能缺少的各個路徑的 SimulationState 引入
          sed -i '2i import com.gpssimulator.ui.SimulationState' "$TARGET_KT" 2>/dev/null || true
          sed -i '2i import com.gpssimulator.SimulationState' "$TARGET_KT" 2>/dev/null || true
          
          # 2. 核心魔法：全域搜尋所有寫著 collect { 的地方，不管是哪一行，通通強行改寫為帶有明確 SimulationState 型態的正規語法！
          # 這會把 collect { 變成 collect { state: SimulationState -> 或者是 collect { it: SimulationState ->
          sed -i 's/collect\s*{\s*$/collect { state: SimulationState ->/g' "$TARGET_KT"
          sed -i 's/collect\s*{\s*state\s*->/collect { state: SimulationState ->/g' "$TARGET_KT"
          sed -i 's/collect\s*{\s*it\s*->/collect { it: SimulationState ->/g' "$TARGET_KT"
        fi

        echo "=== 桌面圖標與 Kotlin 全域語法修補完成 ==="
        ls -la

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Native-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
