name: Manus Native Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Extract Project and Relocate
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 補齊手機桌面 App 圖標
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

        # 💡 盲修大絕招：不論 Manus AI 的第 142 行是寫監聽器還是 SeekBar，我們用多種極端可能直接強制修正文字
        TARGET_KT=$(find . -name "MainActivity.kt" -print -quit)
        if [ ! -z "$TARGET_KT" ]; then
          echo "正在對 $TARGET_KT 進行全自動語法相容性盲修..."
          
          # 可能性 1：如果是 SeekBar 變更監聽器，強制將模糊參數宣告型態
          sed -i '142s/{\s*seekBar\s*,\s*progress\s*,\s*fromUser\s*->/{\s*seekBar:\s*android.widget.SeekBar?,\s*progress:\s*Int,\s*fromUser:\s*Boolean\s*->/g' "$TARGET_KT" || true
          
          # 可能性 2：如果是常見的 Location 監聽器，強制補上 Location 型態
          sed -i '142s/{\s*location\s*->/{\s*location:\s*android.location.Location\s*->/g' "$TARGET_KT" || true
          
          # 可能性 3：如果是簡單的 Lambda 箭頭，強制加上通用 Object
          sed -i 's/lambda\s*->/lambda:\s*Any\s*->/g' "$TARGET_KT" || true
        fi

        echo "=== 桌面圖標與 Kotlin 語法盲修完成 ==="
        ls -la

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Native-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
