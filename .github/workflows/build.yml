name: Manus Native Auto Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Setup Gradle 7.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.5'

    - name: Extract Project and Relocate
      run: |
        mkdir -p temp_extracted
        unzip -q *.zip -d temp_extracted || true
        rm -f *.zip
        
        TARGET_PATH=$(find temp_extracted -name "settings.gradle" -print -quit)
        if [ -z "$TARGET_PATH" ]; then
          echo "錯誤：在 ZIP 壓縮檔內找不到 settings.gradle"
          exit 1
        fi
        
        REAL_PROJECT_DIR=$(dirname "$TARGET_PATH")
        echo "找到專案實際目錄：$REAL_PROJECT_DIR"
        
        cp -r "$REAL_PROJECT_DIR"/* . 2>/dev/null || true
        cp -r "$REAL_PROJECT_DIR"/.* . 2>/dev/null || true
        rm -rf temp_extracted

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 補齊手機桌面 App 圖標
        mkdir -p app/src/main/res/mipmap-hdpi
        cat << 'EOF' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png

        # 💡 智慧路徑追蹤與全域語法修正
        TARGET_KT=$(find . -name "MainActivity.kt" -print -quit)
        if [ ! -z "$TARGET_KT" ]; then
          echo "=== 開始地毯式搜尋 SimulationState 的套件路徑 ==="
          STATE_FILE=$(find . -name "*.kt" -exec grep -l "class SimulationState" {} + -print -quit)
          
          if [ ! -z "$STATE_FILE" ]; then
            # 從該檔案的第一行抓出它的 package 名稱
            DETECTED_PACKAGE=$(grep "^package " "$STATE_FILE" | head -n 1 | sed 's/package //;s/;//;s/ //g')
            echo "成功找到 SimulationState 位於套件：$DETECTED_PACKAGE"
            if [ ! -z "$DETECTED_PACKAGE" ]; then
              sed -i "2i import ${DETECTED_PACKAGE}.SimulationState" "$TARGET_KT"
            fi
          else
            # 如果是寫在同一個套件或同檔案內，嘗試盲補 MainActivity 本身的 package 路徑
            MY_PACKAGE=$(grep "^package " "$TARGET_KT" | head -n 1 | sed 's/package //;s/;//;s/ //g')
            if [ ! -z "$MY_PACKAGE" ]; then
              sed -i "2i import ${MY_PACKAGE}.SimulationState" "$TARGET_KT"
            fi
          fi
          
          # 全域修正 collect 語法，補上明確型態
          sed -i 's/collect\s*{\s*$/collect { state: SimulationState ->/g' "$TARGET_KT"
          sed -i 's/collect\s*{\s*state\s*->/collect { state: SimulationState ->/g' "$TARGET_KT"
          sed -i 's/collect\s*{\s*it\s*->/collect { it: SimulationState ->/g' "$TARGET_KT"
        fi

        echo "=== 智慧套件追蹤與 Kotlin 全域語法修補完成 ==="
        ls -la

    - name: Prepare Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        else
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Manus-GPS-Native-APK
        path: "**/build/outputs/apk/debug/*.apk"
        
